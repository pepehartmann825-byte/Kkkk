<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comic App</title>

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:white}

/* NAV */
.nav{display:flex;background:#111}
.nav button{flex:1;padding:16px;background:none;border:none;color:#aaa}
.nav button.active{color:#00ff99}

/* SCREENS */
.screen{display:none;padding:15px}
.screen.active{display:block}

/* CARD */
.card{background:#161616;margin:10px;padding:14px;border-radius:14px;cursor:pointer}
.small{opacity:.7;font-size:13px}

/* INPUT */
input{padding:12px;width:95%;margin:8px;border-radius:10px;border:none}

/* DETAIL */
#detail{position:fixed;top:0;left:0;width:100%;height:100%;background:#0d0d0d;display:none;overflow:auto;padding:20px}
#detailBox{max-width:600px;margin:auto;background:#161616;padding:15px;border-radius:12px}

.comment{background:#222;padding:8px;margin:5px 0;border-radius:8px}

button{padding:10px;margin:5px;border:none;border-radius:8px;background:#1f1f1f;color:white}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('home',this)" class="active">🏠</button>
<button onclick="show('collection',this)">📚</button>
<button onclick="show('profile',this)">👤</button>
</div>

<!-- HOME -->
<div id="home" class="screen active">

<h3>🏠 Feed</h3>

<input id="search" placeholder="Comic suchen..." oninput="filterComics()">

<div id="feed"></div>

<h4>🎲 Für dich</h4>
<div id="random"></div>

</div>

<!-- COLLECTION -->
<div id="collection" class="screen">
<h3>📚 Sammlung</h3>
<p id="stats"></p>
<div id="myList"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h3>👤 Login</h3>
<button onclick="googleLogin()">🔐 Google Login</button>
<p id="status">Offline</p>

<div id="editorBox" style="display:none;">
<h4>🛠 Post</h4>
<input id="title" placeholder="Titel">
<input id="pages" placeholder="Seiten">
<button onclick="addComic()">➕</button>
</div>

</div>

<!-- DETAIL -->
<div id="detail">
<div id="detailBox"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, doc, getDoc,
addDoc, updateDoc, setDoc, deleteDoc,
arrayUnion, arrayRemove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth, signInWithPopup, GoogleAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "comic-tracker-11dce.firebaseapp.com",
projectId: "comic-tracker-11dce",
storageBucket: "comic-tracker-11dce.firebasestorage.app",
messagingSenderId: "353269603215",
appId: "1:353269603215:web:6594986b906d838f0149fa"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();
const provider = new GoogleAuthProvider();

/* STATE */
let user=null;
let comics=[];
let my=[];
let current=null;

/* NAV */
window.show=function(id,btn){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

/* LOGIN */
window.googleLogin=async function(){
const res=await signInWithPopup(auth,provider);
user=res.user.email;

document.getElementById("status").innerText="👤 "+user;

if(user==="pepehartmann825@gmail.com"){
document.getElementById("editorBox").style.display="block";
}

loadUser();
}

/* LOAD USER COLLECTION */
async function loadUser(){

if(!user)return;

let ref=doc(db,"users",user);
let snap=await getDoc(ref);

if(snap.exists()){
my=snap.data().comics||[];
}else{
await setDoc(ref,{comics:[]});
my=[];
}

load();
}

/* ADD COMIC */
window.addComic=async function(){

if(user!=="pepehartmann825@gmail.com")return;

let t=document.getElementById("title").value;
let p=parseInt(document.getElementById("pages").value);

await addDoc(collection(db,"comics"),{
title:t,pages:p,likes:[],comments:[]
});

load();
}

/* LOAD */
async function load(){

let snap=await getDocs(collection(db,"comics"));
comics=[];
snap.forEach(d=>comics.push({id:d.id,...d.data()}));

render();
}

/* RENDER */
function render(){

let feed=document.getElementById("feed");
feed.innerHTML="";

comics.forEach(c=>{
feed.innerHTML+=`
<div class="card" onclick="openDetail('${c.id}')">
<h3>${c.title}</h3>
<p class="small">${c.pages} Seiten</p>
</div>`;
});

/* RANDOM */
let r=document.getElementById("random");
r.innerHTML="";

[...comics].sort(()=>0.5-Math.random()).slice(0,3)
.forEach(c=>{
r.innerHTML+=`
<div class="card" onclick="openDetail('${c.id}')">
${c.title}
</div>`;
});

/* COLLECTION */
let box=document.getElementById("myList");
box.innerHTML="";
let total=0;

my.forEach(id=>{
let c=comics.find(x=>x.id===id);
if(c){
total+=c.pages;
box.innerHTML+=`<div class="card">${c.title}</div>`;
}
});

document.getElementById("stats").innerText=
`${my.length} Comics | ${total} Seiten`;
}

/* SEARCH */
window.filterComics=function(){

let v=document.getElementById("search").value.toLowerCase();

let f=comics.filter(c=>c.title.toLowerCase().includes(v));

let feed=document.getElementById("feed");
feed.innerHTML="";

f.forEach(c=>{
feed.innerHTML+=`
<div class="card" onclick="openDetail('${c.id}')">
${c.title}
</div>`;
});

}

/* DETAIL */
window.openDetail=function(id){

current=comics.find(c=>c.id===id);

document.getElementById("detailBox").innerHTML=`
<h2>${current.title}</h2>
<p>${current.pages} Seiten</p>

<button onclick="like()">❤️ ${current.likes.length}</button>
<button onclick="add()">➕ Sammlung</button>
<button onclick="comment()">💬</button>

${user==="pepehartmann825@gmail.com"?
`<button onclick="del()">🗑</button>`:""}

<h3>Kommentare</h3>
${current.comments.map(c=>
`<div class="comment"><b>${c.user}</b>: ${c.text}</div>`
).join("")}

<br><button onclick="closeDetail()">❌</button>
`;

document.getElementById("detail").style.display="block";
}

window.closeDetail=()=>{
document.getElementById("detail").style.display="none";
}

/* LIKE */
window.like=async function(){

if(!user)return alert("Login");

let ref=doc(db,"comics",current.id);
let snap=await getDoc(ref);
let likes=snap.data().likes||[];

if(likes.includes(user)){
await updateDoc(ref,{likes:arrayRemove(user)});
}else{
await updateDoc(ref,{likes:arrayUnion(user)});
}

load();
openDetail(current.id);
}

/* ADD */
window.add=async function(){

if(!user)return alert("Login");

if(!my.includes(current.id))my.push(current.id);

await setDoc(doc(db,"users",user),{comics:my});

load();
}

/* COMMENT */
window.comment=async function(){

if(!user)return alert("Login");

let text=prompt("Kommentar");
if(!text)return;

let ref=doc(db,"comics",current.id);
let snap=await getDoc(ref);

let comments=snap.data().comments||[];
comments.push({user,text});

await updateDoc(ref,{comments});

load();
openDetail(current.id);
}

/* DELETE */
window.del=async function(){

if(user!=="pepehartmann825@gmail.com")return;

await deleteDoc(doc(db,"comics",current.id));
closeDetail();
load();
}

load();

</script>

</body>
</html>
